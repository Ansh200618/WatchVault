name: WatchVault Native Quality Check

on:
  push:
    branches: [ main, native-android-migration ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  full-check:
    name: Native Android Backend Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Verify critical native project files exist
        run: |
          test -f backend/package.json
          test -f backend/server.js
          test -f android/gradlew
          test -f android/settings.gradle
          test -f android/app/build.gradle
          test -f android/app/src/main/AndroidManifest.xml
          test -f android/app/src/main/java/com/watchvault/app/NativeMainActivity.java
          test -f android/app/src/main/java/com/watchvault/app/ReminderReceiver.java

      - name: Set up Node.js 22 for backend smoke test
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        run: npm --prefix backend install

      - name: Backend health smoke test
        run: |
          npm --prefix backend start > backend-smoke.log 2>&1 &
          PID=$!
          sleep 5
          curl --fail http://127.0.0.1:5000/api/health
          curl --fail http://127.0.0.1:5000/api/status
          kill $PID

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Capacitor WebView code is not part of native Android app
        run: |
          if grep -R "BridgeActivity\|android.webkit.WebView\|com.getcapacitor" android/app/src/main/java android/app/build.gradle android/settings.gradle; then
            echo "Capacitor/WebView trace found in native Android app."
            exit 1
          fi
          echo "No Capacitor/WebView trace found in native Android app code."

      - name: Android native compile verification only
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew compileReleaseJavaWithJavac --stacktrace --no-daemon

      - name: Verify no debug APK artifact exists
        run: |
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "Debug APK must not be produced or uploaded by quality workflow."
            exit 1
          fi
          echo "Native quality workflow passed without producing a debug APK artifact."
