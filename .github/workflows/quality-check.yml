name: WatchVault Full Quality Check

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  full-check:
    name: Frontend Backend Android Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify critical project files exist
        run: |
          test -f package.json
          test -f vite.config.ts
          test -f capacitor.config.ts
          test -f src/main.tsx
          test -f src/app/App.tsx
          test -f src/app/services/api.ts
          test -f src/app/services/liveData.tsx
          test -f backend/package.json
          test -f backend/server.js
          test -f android/gradlew
          test -f android/app/build.gradle

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend production build
        run: npm run build

      - name: Install backend dependencies
        run: npm --prefix backend install

      - name: Backend health smoke test
        run: |
          npm --prefix backend start > backend-smoke.log 2>&1 &
          PID=$!
          sleep 5
          curl --fail http://127.0.0.1:5000/api/health
          curl --fail http://127.0.0.1:5000/api/status
          kill $PID

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Android debug build
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WatchVault-quality-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk