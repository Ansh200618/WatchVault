name: Build WatchVault APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          set +e
          cd android
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee ../android-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          cd ..

          if [ "$BUILD_EXIT" -ne 0 ]; then
            {
              echo "# Latest WatchVault APK build error"
              echo
              echo "Commit: $GITHUB_SHA"
              echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
              echo
              echo "## Error excerpt"
              echo '```text'
              grep -n -E "FAILURE:|Execution failed|What went wrong|Could not|A problem occurred|Exception|error:|ERROR:|Caused by:" android-build.log -C 10 | head -260 || true
              echo '```'
              echo
              echo "## Last 180 log lines"
              echo '```text'
              tail -180 android-build.log || true
              echo '```'
            } > latest-build-error.md

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add latest-build-error.md android-build.log
            git commit -m "Record latest APK build error [skip ci]" || true
            git push || true
          fi

          exit "$BUILD_EXIT"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WatchVault-android-build-log
          path: android-build.log

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WatchVault-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
