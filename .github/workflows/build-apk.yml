name: Build WatchVault APK

on:
  push:
    branches:
      - main
      - native-android-migration
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      APP_VERSION_CODE: ${{ github.run_number }}
      APP_VERSION_NAME: 1.0.${{ github.run_number }}
      WATCHVAULT_KEYSTORE_PASSWORD: ${{ secrets.WATCHVAULT_KEYSTORE_PASSWORD }}
      WATCHVAULT_KEY_ALIAS: ${{ secrets.WATCHVAULT_KEY_ALIAS }}
      WATCHVAULT_KEY_PASSWORD: ${{ secrets.WATCHVAULT_KEY_PASSWORD }}
      WATCHVAULT_KEYSTORE_PATH: ${{ github.workspace }}/android/app/watchvault-release.jks

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Decode release keystore
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "${{ secrets.WATCHVAULT_KEYSTORE_BASE64 }}" ]; then
            echo "WATCHVAULT_KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          echo "${{ secrets.WATCHVAULT_KEYSTORE_BASE64 }}" | base64 --decode > android/app/watchvault-release.jks

      - run: chmod +x android/gradlew

      - name: Build native release APK
        run: cd android && ./gradlew assembleRelease --stacktrace --no-daemon -PAPP_VERSION_CODE=${APP_VERSION_CODE} -PAPP_VERSION_NAME=${APP_VERSION_NAME}

      - name: Prepare APK files
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/WatchVault-${APP_VERSION_NAME}.apk
          cp android/app/build/outputs/apk/release/app-release.apk release/WatchVault-latest.apk

      - uses: actions/upload-artifact@v4
        with:
          name: WatchVault-${{ env.APP_VERSION_NAME }}
          path: release/WatchVault-${{ env.APP_VERSION_NAME }}.apk

      - name: Publish versioned APK release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION_NAME }}
          name: WatchVault ${{ env.APP_VERSION_NAME }}
          body: Native WatchVault APK. Version ${{ env.APP_VERSION_NAME }}. Built from commit ${{ github.sha }}.
          files: release/WatchVault-${{ env.APP_VERSION_NAME }}.apk
          make_latest: false
          overwrite_files: true

      - name: Publish clean latest APK release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: WatchVault ${{ env.APP_VERSION_NAME }}
          body: Latest native WatchVault APK. Version ${{ env.APP_VERSION_NAME }}. Built from commit ${{ github.sha }}.
          files: release/WatchVault-latest.apk
          make_latest: true
          overwrite_files: true
